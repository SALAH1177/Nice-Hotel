<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/all.min.css">
     <link rel="stylesheet" href="assets/style/login.css">
    <link rel="stylesheet" href="assets/style/bootstrap.min.css">
    <title>Log in</title>
</head>
<body>

    <main>
        <section class="log-in vh-100 w-100 d-flex align-items-center justify-content-center">
            <div class="container">
                <div class=" row justify-content-center align-items-center text-center">
                    <div class="box-login col-4">
                        <div class="text-login">
                            <i class="icon-login fa-brands fa-keycdn mt-3 mb-2 display-2 fw-bold"></i>
                            <h1 class="text-light my-2 fw-bold display-6">Welcome Back</h1>
                            <p class="text-light my-3 fw-bold fs-6">Please login to your account</p>
                        </div>
                        <div class="form-login">
                            <form>
                                <input id="emailInput" class="form-control m-auto w-75 mb-3" type="email" name="" id="" placeholder="Email Address">
                                <input id="passwordInput" class="form-control m-auto w-75 mt-3" type="password" name="" id="" placeholder="Password">
                                <button id="submitBtn" class="btn btn-info w-75 mt-3 m-auto" type="submit">Login</button>
                                <div class="my-3 d-flex justify-content-around align-items-center">
                                    <span class="forgotPassword">forgot password ?</span><span class="createAccount">create an account <a href="signup.html" class="signUp">sign up</a></span>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

   <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/script/bootstrap.bundle.min.js"></script>
    <script src="assets/script/login.js"></script>
</body>
</html>
