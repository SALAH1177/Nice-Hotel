<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="assets/style/all.min.css" />
        <link rel="stylesheet" href="assets/style/login.css" />
    <link rel="stylesheet" href="assets/style/bootstrap.min.css" />

    <title>Sign Up</title>
  </head>
  <body>
    
    <main>
      <section class="sign-up vh-100 h-100 w-100 d-flex align-items-center justify-content-center">
        <div class="container">
          <div class="row justify-content-center align-items-center text-center">
            <div class="box-signup col-5 h-100">
              <div class="title-signup">
                <i class="icon-signup fa-brands fa-keycdn mt-3 mb-2 display-2 fw-bold"></i>
                <h1 class="text-light my-2 fw-bold display-6">Create your account</h1>
                <p class="text-light my-3 fw-bold fs-6">Join us to start booking</p>
              </div>
              <div class="form-signup">
                <form id="form-signup">
                  <input class="form-control m-auto w-75 mb-3 mt-2" type="text" name="#" id="nameInput" placeholder="Full Name" />
                  <span id="error-name" class="text-danger"></span>
                  <input class="form-control m-auto w-75 mt-3 mb-2" type="email" name="#" id="emailInput" placeholder="Email Address" />
                  <span id="error-email" class="text-danger"></span>
                  <div class="password d-flex flex-wrap w-75 m-auto justify-content-between align-items-center">
                    <div class="col-lg-5 col-12">
                      <input class="form-control my-lg-3 my-2" type="password" name="#" id="passwordInput" placeholder="Password" />
                      <!-- <i class="fa-solid fa-eye-slash" id="togglePassword"></i> -->
                      <p id="error-password" class="text-danger"></p>
                    </div>
                    <div class="col-lg-5 col-12">
                      <input class="form-control my-lg-3 my-2" type="password" name="#" id="passwordConfirmInput" placeholder="Confirm Password" />
                      <!-- <i class="fa-solid fa-eye-slash" id="togglePasswordConfirm"></i> -->
                      <p id="error-passwordConfirm" class="text-danger"></p>
                    </div>
                  </div>
                  <button id="submitBtn" class="btn-signUp btn btn-info m-auto form-control my-3 fw-bold fs-6 w-75">Create Account <i class="fa-solid fa-circle-right"></i></button>
                  <p class="text-secondary text-center">Already have an account? <a href="login.html" class="login-page fw-bold">Log in</a></p>
                </form>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  
    <script src="assets/script/bootstrap.bundle.min.js"></script>
    <script src="assets/script/signup.js"></script>
  </body>
</html>
